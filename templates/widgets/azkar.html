<div class="widget-card" data-widget="azkar">
  <div class="widget-head"><i data-feather="book-open"></i><span>الأذكار</span></div>
  <div class="widget-body">
    <div class="azkar-tabs">
      <button class="azkar-tab active" data-cat="morning">الصباح</button>
      <button class="azkar-tab" data-cat="evening">المساء</button>
      <button class="azkar-tab" data-cat="sleep">النوم</button>
    </div>
    <div class="azkar-card">
      <div id="azkarText" class="azkar-text">--</div>
      <div id="azkarCounter" class="azkar-counter">0 / 0</div>
    </div>
    <div class="azkar-actions">
      <button class="btn btn-glass small" id="azkarPrevBtn"><i data-feather="arrow-right"></i></button>
      <button class="btn btn-primary" id="azkarCountBtn">تسبيح</button>
      <button class="btn btn-glass small" id="azkarNextBtn"><i data-feather="arrow-left"></i></button>
    </div>
  </div>
</div>
