<div class="widget-card" data-widget="system_monitor">
  <div class="widget-head"><i data-feather="cpu"></i><span>System Monitor</span></div>
  <div class="widget-body">
    <div class="stat-row"><span>CPU</span><div class="bar"><div id="cpuBar" class="bar-fill" style="width:0%"></div></div><span id="cpuVal">0%</span></div>
    <div class="stat-row"><span>RAM</span><div class="bar"><div id="ramBar" class="bar-fill" style="width:0%"></div></div><span id="ramVal">0%</span></div>
    <div class="stat-row"><span>DISK</span><div class="bar"><div id="diskBar" class="bar-fill" style="width:0%"></div></div><span id="diskVal">0%</span></div>
    <div class="uptime-row">Uptime: <span id="uptimeVal">--</span></div>
  </div>
</div>
