<div class="widget-card" data-widget="stopwatch">
  <div class="widget-head"><i data-feather="watch"></i><span>Stopwatch</span></div>
  <div class="widget-body stopwatch-body">
    <div id="stopwatchDisplay" class="stopwatch-display">00:00:00.0</div>
    <div class="stopwatch-actions">
      <button class="btn btn-primary" id="stopwatchStartBtn">Start</button>
      <button class="btn btn-glass" id="stopwatchLapBtn">roll</button>
      <button class="btn btn-danger" id="stopwatchResetBtn">Reset</button>
    </div>
    <ul id="stopwatchLaps" class="lap-list"></ul>
  </div>
</div>
