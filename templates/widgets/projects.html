<div class="widget-card wide" data-widget="projects">
  <div class="widget-head"><i data-feather="folder"></i><span>project management</span></div>
  <div class="widget-body">
    <div class="project-add-row">
      <input type="text" id="projNameInput" class="text-input" placeholder="project name">
      <input type="text" id="projPathInput" class="text-input" placeholder="full path">
      <input type="text" id="projCmdInput" class="text-input" placeholder="command (example: python app.py)">
      <button class="btn btn-glass small" id="addProjectBtn"><i data-feather="plus"></i></button>
    </div>
    <div id="projectList" class="project-list"></div>
  </div>
</div>
