<div class="widget-card wide" data-widget="calendar">
  <div class="widget-head">
    <i data-feather="calendar"></i><span>Calendar</span>
    <div class="calendar-nav">
      <button class="icon-btn" id="calPrevBtn"><i data-feather="chevron-right"></i></button>
      <span id="calMonthLabel">-- ----</span>
      <button class="icon-btn" id="calNextBtn"><i data-feather="chevron-left"></i></button>
    </div>
  </div>
  <div class="widget-body">
    <div id="calGrid" class="calendar-grid"></div>
    <div class="calendar-add-row">
      <input type="text" id="calEventTitle" class="text-input" placeholder="Event name">
      <input type="date" id="calEventDate" class="text-input">
      <input type="time" id="calEventTime" class="text-input">
      <button class="btn btn-glass small" id="calAddEventBtn"><i data-feather="plus"></i></button>
    </div>
    <div id="calEventsForDay" class="calendar-events-list"></div>
  </div>
</div>
