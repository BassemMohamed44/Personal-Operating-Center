<div class="widget-card" data-widget="windows_control">
  <div class="widget-head"><i data-feather="power"></i><span>Windows Control</span></div>
  <div class="widget-body control-grid">
    <button class="btn btn-glass" data-action="lock"><i data-feather="lock"></i> Lock</button>
    <button class="btn btn-glass" data-action="sleep"><i data-feather="moon"></i> Sleep</button>
    <button class="btn btn-glass" data-action="screenshot"><i data-feather="camera"></i> Screenshot</button>
    <button class="btn btn-danger" data-action="restart"><i data-feather="refresh-cw"></i> Restart</button>
    <button class="btn btn-danger" data-action="shutdown"><i data-feather="power"></i> Shutdown</button>
    <button class="btn btn-glass" data-action="cancel-shutdown"><i data-feather="x-circle"></i> Cancel</button>
  </div>
</div>
